<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="post-title">Loading…</title>

  <link rel="icon" href="../static/assets/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../static/css/styles.css" rel="stylesheet" />
  <link href="../static/css/main.css" rel="stylesheet" />

  <script src="../static/js/bootstrap.bundle.min.js"></script>
  <script src="../static/js/marked.min.js"></script>

  <style>
    /* =========================================
       Megan's Blog Post Refined Styling
       ========================================= */
    
    body {
        background-color: var(--bg-main) !important;
        color: var(--text-main) !important;
        -webkit-font-smoothing: antialiased;
        margin: 0;
        font-family: "Times New Roman", Times, serif !important;
    }

    /* 🌟 核心修复：深蓝色夜间模式 (Soft Navy) */
    [data-theme='dark'] body {
        background-color: #151e2f !important; /* 深蓝色背景 */
        color: #e5e7eb !important;           /* 柔和文字色 */
    }

    /* 确保夜间模式下所有正文元素颜色正确 */
    [data-theme='dark'] #post-content, 
    [data-theme='dark'] #post-content p, 
    [data-theme='dark'] #post-content li, 
    [data-theme='dark'] #post-content span,
    [data-theme='dark'] #post-content strong {
        color: #e5e7eb !important;
    }

    /* 确保 Calibri 标题在深色模式下变亮 */
    [data-theme='dark'] #post-content h2,
    [data-theme='dark'] #post-content h3 {
        color: #f9fafb !important;
    }

    .post-container {
        max-width: 1200px !important;
        margin: 50px auto 60px;
        padding: 0 40px;
    }

    /* 正文细节：保持您的 1 rem 空格设置 */
    #post-content, 
    #post-content p, 
    #post-content li, 
    #post-content span {
        font-family: "Times New Roman", Times, serif !important;
        font-size: 1 rem !important; 
        line-height: 1.45 !important; 
        text-align: justify !important;
        hyphens: auto;
        -webkit-hyphens: auto;
        word-break: break-word; /* 确保长单词能换行 */
    }

    #post-content p {
        margin-top: 0 !important;
        margin-bottom: 0.8rem !important;
    }

    /* 🌟 修复：并列四张图的容器 (彻底清除上方 poster.png 的干扰) */
    #post-content div[style*="display: flex"] {
        display: flex !important;
        justify-content: center !important; 
        align-items: center !important;
        gap: 15px !important;
        clear: both !important; /* 强制换行并清除浮动，确保居中生效 */
        width: 100% !important;
        margin: 2.5rem auto !important;
    }

    #post-content img {
        border-radius: 4px;
        position: static !important;
    }

    /* 针对四张并列图的精准尺寸控制 */
    #post-content img[src*="homepage.png"],
    #post-content img[src*="guide.png"],
    #post-content img[src*="community.png"],
    #post-content img[src*="myprofile.png"] {
        width: 230px !important; 
        height: 480px !important;
        object-fit: contain !important;
        margin: 0 !important;
        display: inline-block !important;
    }

    /* 第一张图：右侧环绕 */
    #post-content img[src*="poster.png"] {
        float: right !important;
        display: inline !important;
        max-width: 300px !important;
        margin: 0.5rem 0 1.2rem 2.5rem !important; 
        clear: none !important;
    }

    /* 最后一张图：铺满对齐 */
    #post-content img[src*="marketing.jpg"] {
        float: none !important;
        display: block !important;
        clear: both !important;
        width: 100% !important;
        max-width: 100% !important;
        margin: 2.5rem 0 !important;
    }

    /* 二级标题：Calibri + 放大字号 + 固定短横线 */
    #post-content h2 {
        font-family: "Calibri", sans-serif !important;
        font-weight: 600;
        font-size: 1.65rem !important; 
        color: var(--title-color) !important;
        margin-top: 2.5rem !important;
        margin-bottom: 1rem !important;
        border-bottom: none !important; 
        position: relative;
        padding-bottom: 12px;
    }

    #post-content h2::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 45px; 
        height: 2px;
        background-color: #888; /* 灰色短线 */
    }

    /* =========================================
       右上角控制按钮样式修正
       ========================================= */
    .post-controls {
        position: fixed;
        top: 20px;
        right: 30px;
        display: flex;
        gap: 12px;
        z-index: 10000;
    }
    
    .btn-action {
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background-color: var(--bg-sidebar);
        color: var(--text-main);
        text-decoration: none !important;
        font-size: 0.85rem;
        font-family: sans-serif;
        box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        transition: all 0.2s ease;
    }
    .btn-action:hover { background-color: var(--border-color); transform: translateY(-1px); }

    /* 🌟 核心修复：确保图标居中不歪斜 */
    .theme-toggle-circle {
        width: 38px !important;
        padding: 0 !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
    }

    nav.navbar { display: none !important; }
  </style>
</head>
<body id="page-top">

  <div class="post-controls">
    <a href="../index.html" class="btn-action">
      <i class="bi bi-house-door me-2"></i> Home
    </a>
    <button id="theme-toggle" class="btn-action theme-toggle-circle">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </div>

  <main class="post-container">
    <article id="post-content" class="main-body"></article>
  </main>

  <footer class="text-center py-5 border-top" style="border-color: var(--border-color) !important;">
    <div style="color: var(--text-muted); font-size: 0.85rem; font-family: sans-serif;">
        &copy; 2026 Jiayu Bao. All Rights Reserved.
    </div>
  </footer>

  <script>
    const mdPath = location.pathname.replace('.html', '.md');
    fetch(mdPath)
      .then(r => r.text())
      .then(md => {
        const firstLine = md.split('\n')[0].replace(/^#\s*/, '');
        document.getElementById('post-title').innerText = firstLine;
        document.getElementById('post-content').innerHTML = marked.parse(md);
      });

    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') {
            if(themeIcon) themeIcon.className = 'bi bi-sun-fill';
        } else {
            if(themeIcon) themeIcon.className = 'bi bi-moon-stars-fill';
        }
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);

    themeToggleBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const nextTheme = isDark ? 'light' : 'dark';
        applyTheme(nextTheme);
        localStorage.setItem('theme', nextTheme);
    });
  </script>
</body>
</html>
