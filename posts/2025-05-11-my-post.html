<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="post-title">Loading…</title>

  <link rel="icon" href="../static/assets/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../static/css/styles.css" rel="stylesheet" />
  <link href="../static/css/main.css" rel="stylesheet" />

  <script src="../static/js/bootstrap.bundle.min.js"></script>
  <script src="../static/js/marked.min.js"></script>

  <style>
    /* =========================================
       Megan's Blog Post Refined Styling
       ========================================= */
    
    body {
        background-color: var(--bg-main) !important;
        color: var(--text-main) !important;
        -webkit-font-smoothing: antialiased;
        margin: 0;
        /* 1. 正文强制 Times New Roman */
        font-family: "Times New Roman", Times, serif !important;
    }

    /* 🌟 核心修复：深蓝色夜间模式 (#151e2f) */
    [data-theme='dark'] body {
        background-color: #151e2f !important; 
        color: #e5e7eb !important;           
    }

    /* 确保夜间模式下内容颜色正确 */
    [data-theme='dark'] #post-content, 
    [data-theme='dark'] #post-content p, 
    [data-theme='dark'] #post-content li, 
    [data-theme='dark'] #post-content span,
    [data-theme='dark'] #post-content strong {
        color: #e5e7eb !important;
    }

    .post-container {
        /* 4. 页面宽度 1200px */
        max-width: 1200px !important;
        margin: 50px auto 60px;
        padding: 0 40px;
    }

    /* 正文细节：保持您的 1 rem 空格设置与 Times New Roman */
    #post-content, 
    #post-content p, 
    #post-content li, 
    #post-content span {
        font-family: "Times New Roman", Times, serif !important;
        font-size: 1 rem !important; 
        line-height: 1.45 !important; 
        text-align: justify !important;
        hyphens: auto;
        -webkit-hyphens: auto;
        word-break: break-word; /* 确保长单词能换行 */
    }

    #post-content p {
        margin-top: 0 !important;
        margin-bottom: 0.8rem !important;
    }

    /* 🌟 修正：并列图容器 (defense.jpg & defense29.jpg) */
    #post-content div[style*="display: flex"] {
        display: flex !important;
        justify-content: center !important; 
        align-items: center !important;
        gap: 20px !important;
        clear: both !important; 
        margin: 2.5rem auto !important;
        width: 100% !important;
    }

    /* 所有图片基础防拉伸设置 */
    #post-content img {
        border-radius: 6px;
        position: static !important;
        height: auto !important; /* 确保不被拉伸 */
        object-fit: contain !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    /* 针对单张大图的对齐（飞机、饮料等） */
    #post-content img[src*="plane.jpg"],
    #post-content img[src*="drink.jpg"] {
        display: block !important;
        margin: 2rem auto !important; /* 强制水平居中 */
        max-width: 600px !important;   /* 限制单图宽度，避免占满全屏 */
    }

    /* 针对并列的两张辩护照片 */
    #post-content img[src*="defense"] {
        width: 45% !important;        /* 两张并列，每张约 45% */
        max-width: 500px !important;
        margin: 0 !important;
    }

    /* 二级标题：Calibri + 放大字号 + 固定短横线 */
    #post-content h2 {
        font-family: "Calibri", sans-serif !important;
        font-weight: 600;
        font-size: 1.65rem !important; 
        color: var(--title-color) !important;
        margin-top: 2.5rem !important;
        margin-bottom: 1rem !important;
        border-bottom: none !important; 
        position: relative;
        padding-bottom: 12px;
    }

    #post-content h2::after {
        content: "";
        position: absolute;
        left: 0; bottom: 0;
        width: 45px; height: 2px;
        background-color: #888;
    }

    /* =========================================
       右上角控制按钮 (对齐修正 + 返回主页)
       ========================================= */
    .post-controls {
        position: fixed;
        top: 20px;
        right: 30px;
        display: flex;
        gap: 12px;
        z-index: 10000;
    }
    
    .btn-action {
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background-color: var(--bg-sidebar);
        color: var(--text-main);
        text-decoration: none !important;
        font-size: 0.85rem;
        font-family: sans-serif;
        box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        transition: all 0.2s ease;
    }
    .btn-action:hover { background-color: var(--border-color); transform: translateY(-1px); }

    /* 图标绝对居中逻辑 */
    .theme-toggle-circle {
        width: 38px !important;
        padding: 0 !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
    }

    /* 移除原有顶栏 */
    nav.navbar { display: none !important; }
  </style>
</head>
<body id="page-top">

  <div class="post-controls">
    <a href="../index.html" class="btn-action">
      <i class="bi bi-house-door me-2"></i> Home
    </a>
    <button id="theme-toggle" class="btn-action theme-toggle-circle">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </div>

  <main class="post-container">
    <article id="post-content" class="main-body"></article>
  </main>

  <footer class="text-center py-5 border-top" style="border-color: var(--border-color) !important;">
    <div style="color: var(--text-muted); font-size: 0.85rem; font-family: sans-serif;">
        &copy; 2026 Jiayu Bao. All Rights Reserved.
    </div>
  </footer>

  <script>
    // 1. 获取并渲染内容
    const mdPath = location.pathname.replace('.html', '.md');
    fetch(mdPath)
      .then(r => r.text())
      .then(md => {
        const firstLine = md.split('\n')[0].replace(/^#\s*/, '');
        document.getElementById('post-title').innerText = firstLine;
        document.getElementById('post-content').innerHTML = marked.parse(md);
      });

    // 2. 主题切换与同步
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') {
            if(themeIcon) themeIcon.className = 'bi bi-sun-fill';
        } else {
            if(themeIcon) themeIcon.className = 'bi bi-moon-stars-fill';
        }
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);

    themeToggleBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const nextTheme = isDark ? 'light' : 'dark';
        applyTheme(nextTheme);
        localStorage.setItem('theme', nextTheme);
    });
  </script>
</body>
</html>
