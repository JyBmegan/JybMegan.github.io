<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="post-title">Loading…</title>

  <link rel="icon" href="../static/assets/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../static/css/styles.css" rel="stylesheet" />
  <link href="../static/css/main.css" rel="stylesheet" />

  <script src="../static/js/bootstrap.bundle.min.js"></script>
  <script src="../static/js/marked.min.js"></script>

  <style>
    /* =========================================
        Megan's Special Blog Styling
       ========================================= */
    
    /* 1. 全局字体与字号调整 */
    body {
        font-family: "Times New Roman", Times, serif !important;
        font-size: 0.95rem !important; /* 字号变小 */
        line-height: 1.6 !important;
        color: var(--text-main) !important;
        background-color: var(--bg-main) !important;
    }

    /* 4. 页面宽度调大 (1050px) */
    .blog-container {
        max-width: 1050px !important;
        margin: 0 auto;
        padding: 80px 20px 50px 20px;
    }

    /* 3. 图片宽度限制：确保图文对齐，且图不宽于文字 */
    #post-content img {
        max-width: 100% !important;
        height: auto !important;
        display: block !important;
        margin: 2rem auto !important;
        border-radius: 4px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* 正文细节：针对 Markdown 渲染后的标签 */
    #post-content p, #post-content li {
        margin-bottom: 1rem !important;
        text-align: justify; /* 两端对齐更有学术出版感 */
    }

    /* 文章内的小标题保持衬线体但字号适中 */
    #post-content h1, #post-content h2, #post-content h3 {
        font-family: 'Lora', serif !important;
        color: var(--title-color) !important;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 0.5rem;
        margin-top: 2rem;
    }

    /* 5. 右上角功能区：返回按钮 + 主题切换 */
    .blog-controls {
        position: fixed;
        top: 20px;
        right: 30px;
        display: flex;
        gap: 10px;
        z-index: 9999;
    }

    .btn-control {
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background-color: var(--bg-sidebar);
        color: var(--text-main);
        text-decoration: none !important;
        font-size: 0.85rem;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        transition: all 0.3s ease;
    }

    .btn-control:hover {
        transform: translateY(-2px);
        background-color: var(--border-color);
        color: var(--link-hover);
    }

    .theme-circle-btn {
        width: 40px;
        padding: 0;
        border-radius: 50%;
    }

    /* 适配黑色版 - 之前的 main.css 变量会生效 */
  </style>
</head>

<body id="page-top">

  <div class="blog-controls">
    <a href="../index.html" class="btn-control">
      <i class="bi bi-arrow-left me-2"></i> Back Home
    </a>
    <button id="theme-toggle" class="btn-control theme-circle-btn">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </div>

  <main class="blog-container">
    <article id="post-content"></article>
  </main>

  <footer class="text-center py-5 border-top" style="border-color: var(--border-color) !important;">
    <div style="color: var(--text-muted); font-size: 0.85rem; font-family: sans-serif;">
        &copy; 2026 Jiayu Bao. All Rights Reserved.
    </div>
  </footer>

  <script>
    // 1. 加载并渲染 Markdown
    const mdPath = location.pathname.replace('.html', '.md');
    fetch(mdPath)
      .then(r => r.text())
      .then(md => {
        // 自动提取第一行作为页面标题
        const lines = md.split('\n');
        const firstLine = lines[0].replace(/^#\s*/, '');
        document.getElementById('post-title').innerText = firstLine;
        
        // 渲染正文
        document.getElementById('post-content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('post-content').innerHTML = '<p>Failed to load post content.</p>';
      });

    // 2. 黑白模式自动同步逻辑
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') {
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        } else {
            themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
        }
    }

    // 页面加载时自动同步主页的主题设置
    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);

    // 手动切换
    themeToggleBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const nextTheme = isDark ? 'light' : 'dark';
        applyTheme(nextTheme);
        localStorage.setItem('theme', nextTheme);
    });
  </script>
</body>
</html>
